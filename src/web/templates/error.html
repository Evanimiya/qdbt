{% extends "base.html" %}
{% block title %}오류 {{ code }}{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-16 text-center">
  <div class="text-6xl mb-4">{% if code==404 %}🔍{% elif code==403 %}🔒{% else %}⚠️{% endif %}</div>
  <h1 class="text-3xl font-bold text-gray-900 mb-2">{{ code }}</h1>
  <p class="text-gray-500 break-ko mb-6">{{ message }}</p>
  <a href="{{ url_for('projects.index') }}"
     class="inline-block bg-blue-700 hover:bg-blue-800 text-white font-semibold
            py-2.5 px-6 rounded-lg">홈으로</a>
</div>
{% endblock %}
