{% extends "base.html" %}
{% block title %}새 프로젝트{% endblock %}

{% block content %}
<div class="max-w-xl">
  <nav class="text-sm mb-4 text-gray-500">
    <a href="{{ url_for('projects.index') }}" class="hover:text-blue-700">프로젝트</a>
    <span class="mx-2">›</span> 새 프로젝트
  </nav>

  <h1 class="text-xl font-bold text-gray-900 mb-5 break-ko">새 프로젝트 만들기</h1>

  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 sm:p-6">
    <form method="POST">
      <div class="mb-4">
        <label class="block text-sm font-semibold text-gray-700 mb-1">
          프로젝트명 <span class="text-red-500">*</span>
        </label>
        <input type="text" name="name" required autofocus placeholder="예: 2026년 서버 인프라 구축"
               class="w-full px-3 py-2.5 border border-gray-300 rounded-lg
                      focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
      </div>
      <div class="mb-6">
        <label class="block text-sm font-semibold text-gray-700 mb-1">설명 (선택)</label>
        <textarea name="description" rows="3" placeholder="프로젝트에 대한 간략한 설명"
                  class="w-full px-3 py-2.5 border border-gray-300 rounded-lg
                         focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-none">
        </textarea>
      </div>
      <div class="flex gap-3">
        <button type="submit"
                class="flex-1 bg-blue-700 hover:bg-blue-800 text-white font-semibold
                       py-2.5 rounded-lg transition-colors break-ko">
          프로젝트 생성
        </button>
        <a href="{{ url_for('projects.index') }}"
           class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold
                  py-2.5 rounded-lg text-center transition-colors break-ko">
          취소
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
