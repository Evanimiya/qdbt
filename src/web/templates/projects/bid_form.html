{% extends "base.html" %}
{% block title %}입찰 추가 · {{ project.name }}{% endblock %}

{% block content %}
<div class="max-w-xl">
  <nav class="text-sm mb-4 text-gray-500">
    <a href="{{ url_for('projects.index') }}" class="hover:text-blue-700">프로젝트</a>
    <span class="mx-2">›</span>
    <a href="{{ url_for('projects.detail', project_id=project.project_id) }}"
       class="hover:text-blue-700 break-ko">{{ project.name }}</a>
    <span class="mx-2">›</span> 입찰 추가
  </nav>

  <h1 class="text-xl font-bold text-gray-900 mb-5 break-ko">입찰 추가</h1>

  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 sm:p-6">
    <form method="POST">
      <div class="mb-4">
        <label class="block text-sm font-semibold text-gray-700 mb-1">
          입찰명 <span class="text-red-500">*</span>
        </label>
        <input type="text" name="name" required autofocus placeholder="예: 1차 입찰"
               class="w-full px-3 py-2.5 border border-gray-300 rounded-lg
                      focus:ring-2 focus:ring-blue-500 focus:border-blue-500 break-ko">
      </div>
      <div class="mb-4">
        <label class="block text-sm font-semibold text-gray-700 mb-1">마감일 (선택)</label>
        <input type="date" name="due_date"
               class="w-full px-3 py-2.5 border border-gray-300 rounded-lg
                      focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
      </div>
      <div class="mb-6">
        <label class="block text-sm font-semibold text-gray-700 mb-1">비고 (선택)</label>
        <textarea name="description" rows="2"
                  class="w-full px-3 py-2.5 border border-gray-300 rounded-lg
                         focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-none">
        </textarea>
      </div>
      <div class="flex gap-3">
        <button type="submit"
                class="flex-1 bg-blue-700 hover:bg-blue-800 text-white font-semibold
                       py-2.5 rounded-lg transition-colors break-ko">
          입찰 생성
        </button>
        <a href="{{ url_for('projects.detail', project_id=project.project_id) }}"
           class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold
                  py-2.5 rounded-lg text-center transition-colors break-ko">
          취소
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
