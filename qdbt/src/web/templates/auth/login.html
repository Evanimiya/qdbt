<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>로그인 · 입찰 데이터 관리</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/[email protected]/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>body{font-family:'Pretendard',system-ui,sans-serif;}</style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
<div class="w-full max-w-sm">
  <div class="text-center mb-8">
    <div class="text-4xl mb-2">📋</div>
    <h1 class="text-2xl font-bold text-gray-900">입찰 데이터 관리</h1>
    <p class="text-sm text-gray-500 mt-1">로그인하여 시작하세요</p>
  </div>

  {% with msgs = get_flashed_messages(with_categories=true) %}
  {% if msgs %}
  <div class="mb-4 space-y-2">
    {% for cat, msg in msgs %}
    <div class="p-3 rounded-lg text-sm
      {% if cat=='error' %}bg-red-50 border border-red-200 text-red-900
      {% else %}bg-blue-50 border border-blue-200 text-blue-900{% endif %}">
      {{ msg }}
    </div>
    {% endfor %}
  </div>
  {% endif %}
  {% endwith %}

  <div class="bg-white rounded-xl shadow-md p-6 sm:p-8">
    <form method="POST">
      <div class="mb-4">
        <label class="block text-sm font-semibold text-gray-700 mb-1">이메일</label>
        <input type="email" name="email" required autofocus
               class="w-full px-3 py-2.5 border border-gray-300 rounded-lg
                      focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
      </div>
      <div class="mb-6">
        <label class="block text-sm font-semibold text-gray-700 mb-1">비밀번호</label>
        <input type="password" name="password" required
               class="w-full px-3 py-2.5 border border-gray-300 rounded-lg
                      focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
      </div>
      <button type="submit"
              class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold
                     py-2.5 rounded-lg transition-colors">
        로그인
      </button>
    </form>
  </div>
</div>
</body>
</html>
